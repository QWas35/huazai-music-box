name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Set up Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
      
      - name: Build APK with Docker
        run: |
          docker run --rm -v "${{ github.workspace }}:/app" -w /app ubuntu:22.04 sh -c "
            apt-get update && apt-get install -y python3 python3-pip git curl wget unzip openjdk-17-jdk &&
            pip3 install buildozer &&
            buildozer android debug
          "
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: huazaimusicbox
          path: bin/*.apk
